<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Şifre Sıfırlama - Orbicorp</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border-color: #e2e8f0;
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --accent-light: #e0e7ff;
      --error-color: #ef4444;
      --error-bg: #fef2f2;
      --success-color: #22c55e;
      --success-bg: #f0fdf4;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
      --radius: 12px;
    }

    [data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      --border-color: #334155;
      --accent-light: #312e81;
      --error-bg: #450a0a;
      --success-bg: #052e16;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4), 0 2px 4px -2px rgba(0,0,0,0.3);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.4), 0 4px 6px -4px rgba(0,0,0,0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    /* Logo & Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md);
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      color: white;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Card */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow-lg);
    }

    /* Form Elements */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      outline: none;
      transition: all 0.2s;
    }

    .form-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input.error {
      border-color: var(--error-color);
      background: var(--error-bg);
    }

    /* Messages */
    .message {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .message.show {
      display: flex;
    }

    .message.error {
      background: var(--error-bg);
      border: 1px solid var(--error-color);
      color: var(--error-color);
    }

    .message.success {
      background: var(--success-bg);
      border: 1px solid var(--success-color);
      color: var(--success-color);
    }

    .message svg {
      flex-shrink: 0;
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      color: white;
      background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .submit-btn .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .submit-btn.loading .spinner {
      display: block;
    }

    .submit-btn.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Back Link */
    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--accent-color);
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Theme & Language Toggle */
    .toolbar {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
    }

    .toolbar-btn {
      width: 40px;
      height: 40px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .toolbar-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .toolbar-btn svg {
      width: 20px;
      height: 20px;
    }

    /* Success State */
    .success-state {
      display: none;
      text-align: center;
      padding: 20px 0;
    }

    .success-state.show {
      display: block;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background: var(--success-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .success-icon svg {
      width: 32px;
      height: 32px;
      color: var(--success-color);
    }

    .success-state h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .success-state p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .form-state {
      display: block;
    }

    .form-state.hide {
      display: none;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px;
      }

      .logo-text {
        font-size: 24px;
      }

      .toolbar {
        top: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>
  <!-- Theme & Language Toggle -->
  <div class="toolbar">
    <button class="toolbar-btn" id="langToggle" title="Dil Değiştir">
      <span style="font-size: 14px; font-weight: 600;">TR</span>
    </button>
    <button class="toolbar-btn" id="themeToggle" title="Tema Değiştir">
      <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"></circle>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
      </svg>
      <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </div>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 6v6l4 2"></path>
          </svg>
        </div>
        <span class="logo-text">Orbicorp</span>
      </div>
      <h1 data-i18n="forgot.title">Şifrenizi mi Unuttunuz?</h1>
      <p data-i18n="forgot.subtitle">Email adresinizi girin, size şifre sıfırlama linki gönderelim.</p>
    </div>

    <!-- Card -->
    <div class="card">
      <!-- Form State -->
      <div class="form-state" id="formState">
        <form id="forgotForm">
          <!-- Error Message -->
          <div class="message error" id="errorMessage">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span id="errorText"></span>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label class="form-label" for="email" data-i18n="forgot.email">Email Adresi</label>
            <input 
              type="email" 
              id="email" 
              class="form-input" 
              placeholder="ornek@sirket.com"
              autocomplete="email"
              required
            >
          </div>

          <!-- Submit -->
          <button type="submit" class="submit-btn" id="submitBtn">
            <span class="spinner"></span>
            <span class="btn-text" data-i18n="forgot.submit">Sıfırlama Linki Gönder</span>
          </button>
        </form>
      </div>

      <!-- Success State -->
      <div class="success-state" id="successState">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h2 data-i18n="forgot.success.title">Email Gönderildi!</h2>
        <p data-i18n="forgot.success.text">Şifre sıfırlama linki email adresinize gönderildi. Lütfen gelen kutunuzu kontrol edin.</p>
        <a href="orbicorp-login.html" class="submit-btn" data-i18n="forgot.success.back">Giriş Sayfasına Dön</a>
      </div>
    </div>

    <!-- Back Link -->
    <a href="orbicorp-login.html" class="back-link" id="backLink">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      <span data-i18n="forgot.back">Giriş sayfasına dön</span>
    </a>

    <!-- Footer -->
    <div class="footer">
      <p>© 2026 Orbicorp. <span data-i18n="forgot.rights">Tüm hakları saklıdır.</span></p>
    </div>
  </div>

  <script>
    // =====================
    // i18n Translations
    // =====================
    const translations = {
      tr: {
        'forgot.title': 'Şifrenizi mi Unuttunuz?',
        'forgot.subtitle': 'Email adresinizi girin, size şifre sıfırlama linki gönderelim.',
        'forgot.email': 'Email Adresi',
        'forgot.submit': 'Sıfırlama Linki Gönder',
        'forgot.back': 'Giriş sayfasına dön',
        'forgot.rights': 'Tüm hakları saklıdır.',
        'forgot.error.invalid': 'Geçerli bir email adresi girin',
        'forgot.error.notfound': 'Bu email adresi kayıtlı değil',
        'forgot.error.network': 'Bağlantı hatası. Lütfen tekrar deneyin.',
        'forgot.success.title': 'Email Gönderildi!',
        'forgot.success.text': 'Şifre sıfırlama linki email adresinize gönderildi. Lütfen gelen kutunuzu kontrol edin.',
        'forgot.success.back': 'Giriş Sayfasına Dön',
      },
      en: {
        'forgot.title': 'Forgot Your Password?',
        'forgot.subtitle': 'Enter your email address and we\'ll send you a password reset link.',
        'forgot.email': 'Email Address',
        'forgot.submit': 'Send Reset Link',
        'forgot.back': 'Back to login',
        'forgot.rights': 'All rights reserved.',
        'forgot.error.invalid': 'Please enter a valid email address',
        'forgot.error.notfound': 'This email address is not registered',
        'forgot.error.network': 'Connection error. Please try again.',
        'forgot.success.title': 'Email Sent!',
        'forgot.success.text': 'A password reset link has been sent to your email. Please check your inbox.',
        'forgot.success.back': 'Back to Login',
      }
    };

    let currentLang = localStorage.getItem('orbicorp_lang') || 'tr';

    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[currentLang][key]) {
          el.textContent = translations[currentLang][key];
        }
      });
      document.getElementById('email').placeholder = currentLang === 'tr' ? 'ornek@sirket.com' : 'example@company.com';
      document.getElementById('langToggle').querySelector('span').textContent = currentLang.toUpperCase();
    }

    // =====================
    // Theme Management
    // =====================
    function getSystemTheme() {
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      const sunIcon = document.querySelector('.sun-icon');
      const moonIcon = document.querySelector('.moon-icon');
      if (theme === 'dark') {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      } else {
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      }
    }

    let currentTheme = localStorage.getItem('orbicorp_theme') || getSystemTheme();
    applyTheme(currentTheme);

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('orbicorp_theme')) {
        applyTheme(e.matches ? 'dark' : 'light');
      }
    });

    // =====================
    // Event Listeners
    // =====================

    // Theme Toggle
    document.getElementById('themeToggle').addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('orbicorp_theme', currentTheme);
      applyTheme(currentTheme);
    });

    // Language Toggle
    document.getElementById('langToggle').addEventListener('click', () => {
      currentLang = currentLang === 'tr' ? 'en' : 'tr';
      localStorage.setItem('orbicorp_lang', currentLang);
      applyTranslations();
    });

    // Form Submit
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const submitBtn = document.getElementById('submitBtn');
      const errorMessage = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');

      // Reset error state
      errorMessage.classList.remove('show');
      document.getElementById('email').classList.remove('error');

      // Validate email
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email || !emailRegex.test(email)) {
        errorText.textContent = translations[currentLang]['forgot.error.invalid'];
        errorMessage.classList.add('show');
        document.getElementById('email').classList.add('error');
        return;
      }

      // Show loading
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        // Simulate API call (backend endpoint doesn't exist yet)
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        // Show success state
        document.getElementById('formState').classList.add('hide');
        document.getElementById('successState').classList.add('show');
        document.getElementById('backLink').style.display = 'none';
        
      } catch (error) {
        console.error('Forgot password error:', error);
        errorText.textContent = translations[currentLang]['forgot.error.network'];
        errorMessage.classList.add('show');
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });

    // =====================
    // Initialize
    // =====================
    document.addEventListener('DOMContentLoaded', () => {
      applyTranslations();
    });
  </script>
</body>
</html>
